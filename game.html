<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>World Cup 2026 - My Predictions</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      font-size: 10pt;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 16px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
    }

    .title {
      font-size: 14pt;
      font-weight: bold;
    }

    button {
      padding: 6px 10px;
      cursor: pointer;
    }

    .page-wrap {
      max-width: 980px;
      margin: auto;
      padding: 15px;
    }

    .match-card {
      background: white;
      padding: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    .teams {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .pick-btn.selected {
      background: #d8e9ff;
    }

    .flag {
      width: 20px;
    }

  </style>
</head>

<body>

<div class="topbar">
  <div class="title">My Predictions 2 </div>
  <div>
    <button onclick="goBack()">Save My Predictions</button>
  </div>
</div>

<div class="page-wrap" id="app"></div>

<!-- ✅ FIXED FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDpqwUsHn1qdUANh45tnW-e8aHVt8EF0Fk",
  authDomain: "wc-2026-843c7.firebaseapp.com",
  projectId: "wc-2026-843c7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const userId = localStorage.getItem("userId");
if (!userId) window.location.href = "index.html";

function goBack() {
  window.location.href = "landing.html";
}

/* ✅ CLEAN FLAG MAP */
const teamFlagUrl = {
  "Mexico": "https://flagcdn.com/w40/mx.png",
  "South Africa": "https://flagcdn.com/w40/za.png",
  "USA": "https://flagcdn.com/w40/us.png",
  "Brazil": "https://flagcdn.com/w40/br.png",
  "Australia": "https://flagcdn.com/w40/au.png",
  "France": "https://flagcdn.com/w40/fr.png",
  "Japan": "https://flagcdn.com/w40/jp.png"
};

/* ✅ SAMPLE MATCH (kept minimal) */
const matches = [
  { id: "A1", team1: "Mexico", team2: "South Africa" },
  { id: "A2", team1: "USA", team2: "Brazil" }
];

function savePrediction(matchId, value) {
  const docId = userId + "_" + matchId;

  db.collection("predictions").doc(docId).set({
    user_id: userId,
    match_id: matchId,
    prediction: value,
    updated_at: new Date()
  });
}

function loadUserPredictions() {
  db.collection("predictions")
    .where("user_id", "==", userId)
    .get()
    .then(snapshot => {

      snapshot.forEach(doc => {
        const d = doc.data();
        document.getElementById(`${d.match_id}_${d.prediction}`)?.classList.add("selected");
      });

    });
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  matches.forEach(match => {

    const div = document.createElement("div");
    div.className = "match-card";

    div.innerHTML = `
      <div class="teams">
        <span>${match.team1}</span>
        vs
        <span>${match.team2}</span>
      </div>

      <div>
        <button id="${match.id}_team1" onclick="pick('${match.id}','team1')">${match.team1}</button>
        <button id="${match.id}_tie" onclick="pick('${match.id}','tie')">Tie</button>
        <button id="${match.id}_team2" onclick="pick('${match.id}','team2')">${match.team2}</button>
      </div>
    `;

    app.appendChild(div);
  });

  loadUserPredictions();
}

function pick(matchId, value) {

  document.querySelectorAll(`[id^=${matchId}_]`).forEach(b => b.classList.remove("selected"));

  document.getElementById(`${matchId}_${value}`).classList.add("selected");

  savePrediction(matchId, value);
}

render();

</script>

</body>
</html>
