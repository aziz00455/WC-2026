<!DOCTYPE html>
<html>
<head>
  <title>Game</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    /* ✅ TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
    }

    .title {
      font-size: 20px;
    }

    .buttons {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>

<body>

<!-- ✅ HEADER -->
<div class="topbar">

  <!-- ✅ TITLE -->
  <div class="title" id="title"></div>

  <!-- ✅ BUTTONS (RIGHT SIDE) -->
  <div class="buttons">
    <button onclick="goBack()">Back to Leaderboard</button>
    <button onclick="logout()">Logout</button>
  </div>

</div>


<script>

  // ✅ LOGIN CHECK
  const userId = localStorage.getItem("userId");
  if (!userId) {
    window.location.href = "index.html";
  }

  // ✅ SET TITLE: username Prediction
  // (for now using userId — later we can replace with username)
  document.getElementById("title").innerText = userId + " Prediction";


  // ✅ NAVIGATION
  function goBack() {
    window.location.href = "landing.html";
  }

  // ✅ LOGOUT
  function logout() {
    localStorage.removeItem("userId");
    window.location.href = "index.html";
  }

</script>

</body>
</html>
