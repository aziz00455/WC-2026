<!DOCTYPE html>
<html>
<head>
  <title>Game</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>Game Page</h2>

<div class="buttons">
  <button onclick="goBack()">Back to Leaderboard</button>
  <button onclick="logout()">Logout</button>
</div>

<script>

  // ✅ LOGIN CHECK (optional but recommended)
  const userId = localStorage.getItem("userId");
  if (!userId) {
    window.location.href = "index.html";
  }

  // ✅ NAVIGATION
  function goBack() {
    window.location.href = "landing.html";
  }

  // ✅ LOGOUT
  function logout() {
    localStorage.removeItem("userId");
    window.location.href = "index.html";
  }

</script>

</body>
</html>
