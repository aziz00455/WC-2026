  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      font-size: 10pt; /* all contents */
      background: #f5f5f5;
      color: #222;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .title {
      font-size: 14pt;   /* heading */
      font-weight: bold; /* heading */
    }

    .topbar-buttons {
      display: flex;
      gap: 8px;
    }

    button {
      font-size: 10pt;
      padding: 6px 10px;
      cursor: pointer;
      border: 1px solid #bbb;
      background: #fff;
      border-radius: 4px;
    }

    button:hover:not(:disabled) {
      background: #f0f0f0;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .page-wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 14px 32px 14px;
    }

    .date-section {
      margin-bottom: 24px;
    }

    .date-heading {
      font-size: 14pt;
      font-weight: bold;
      margin: 8px 0 12px 0;
    }

    .group-heading {
      font-size: 10pt;
      font-weight: bold;
      margin: 10px 0 8px 0;
      color: #333;
    }

    .match-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .match-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .match-time {
      color: #444;
      white-space: nowrap;
    }

    .teams-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .team {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 150px;
      justify-content: center;
    }

    .flag {
      width: 22px;
      height: 16px;
      object-fit: cover;
      border: 1px solid #ccc;
      border-radius: 2px;
      background: #fff;
      flex-shrink: 0;
    }

    .vs {
      color: #666;
      font-weight: bold;
      min-width: 24px;
      text-align: center;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pick-btn.selected {
      background: #d8e9ff;
      border-color: #5c92d9;
      font-weight: bold;
    }

    .status-line {
      margin-top: 10px;
      text-align: center;
      color: #666;
    }

    .status-line.locked {
      color: #b00000;
    }

    .status-line.saved {
      color: #006400;
    }
  </style>

    // -----------------------------
    // Local pick persistence per user
    // -----------------------------
    const picksKey = "wc2026_picks_" + userId;
    let savedPicks = JSON.parse(localStorage.getItem(picksKey) || "{}");

    function savePick(matchId, choice) {
      savedPicks[matchId] = choice;
      localStorage.setItem(picksKey, JSON.stringify(savedPicks));
    }

    function getPick(matchId) {
      return savedPicks[matchId] || null;
    }

    // -----------------------------
    // Helpers
    // -----------------------------
    function formatPrettyDate(dateStr) {
      const dt = new Date(dateStr + "T00:00:00");
      return dt.toLocaleDateString("en-US", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
      });
    }

    function isLocked(match) {
      return Date.now() >= new Date(match.startEdt).getTime();
    }

    function groupMatchesByDate(data) {
      const map = {};
      data.forEach(m => {
        if (!map[m.date]) map[m.date] = [];
        map[m.date].push(m);
      });

      Object.keys(map).forEach(date => {
        map[date].sort((a, b) => {
          if (a.group !== b.group) return a.group.localeCompare(b.group);
          return a.time.localeCompare(b.time);
        });
      });

      return map;
    }

    // -----------------------------
    // Render
    // -----------------------------
    function render() {
      const app = document.getElementById("app");
      app.innerHTML = "";

      const byDate = groupMatchesByDate(matches);
      const dates = Object.keys(byDate).sort();

      dates.forEach(date => {
        const dateSection = document.createElement("div");
        dateSection.className = "date-section";

        const dateHeading = document.createElement("div");
        dateHeading.className = "date-heading";
        dateHeading.textContent = formatPrettyDate(date);
        dateSection.appendChild(dateHeading);

        let currentGroup = null;

        byDate[date].forEach(match => {
          if (match.group !== currentGroup) {
            currentGroup = match.group;
            const groupHeading = document.createElement("div");
            groupHeading.className = "group-heading";
            groupHeading.textContent = "Group " + currentGroup;
            dateSection.appendChild(groupHeading);
          }

          const locked = isLocked(match);
          const existingPick = getPick(match.id);

          const card = document.createElement("div");
          card.className = "match-card";

          card.innerHTML = `
            <div class="match-top">
              <div><strong>Group ${match.group}</strong></div>
              <div class="match-time">${match.time} EDT</div>
            </div>

            <div class="teams-row">
              <div class="team">
                <img class="flag" src="${match.flag1}" alt="${match.team1} flag">
                <span>${match.team1}</span>
              </div>

              <div class="vs">vs</div>

              <div class="team">
                <img class="flag" src="${match.flag2}" alt="${match.team2} flag">
                <span>${match.team2}</span>
              </div>
            </div>

            <div class="actions">
              <button class="pick-btn ${existingPick === "team1" ? "selected" : ""}" ${locked ? "disabled" : ""} data-choice="team1">${match.team1}</button>
              <button class="pick-btn ${existingPick === "tie" ? "selected" : ""}" ${locked ? "disabled" : ""} data-choice="tie">Tie</button>
              <button class="pick-btn ${existingPick === "team2" ? "selected" : ""}" ${locked ? "disabled" : ""} data-choice="team2">${match.team2}</button>
            </div>
          `;

          const status = document.createElement("div");
          status.className = "status-line";

          if (locked) {
            status.classList.add("locked");
            status.textContent = existingPick
              ? "Prediction closed"
              : "Prediction closed";
          } else if (existingPick) {
            status.classList.add("saved");
            const label =
              existingPick === "team1" ? match.team1 :
              existingPick === "team2" ? match.team2 : "Tie";
            status.textContent = "Saved pick: " + label;
          } else {
            status.textContent = "";
          }

          card.appendChild(status);

          const buttons = card.querySelectorAll(".pick-btn");
          buttons.forEach(btn => {
            if (!locked) {
              btn.addEventListener("click", function () {
                const choice = btn.getAttribute("data-choice");
                savePick(match.id, choice);

                buttons.forEach(b => b.classList.remove("selected"));
                btn.classList.add("selected");

                status.className = "status-line saved";
                status.textContent =
                  "Saved pick: " +
                  (choice === "team1" ? match.team1 :
                   choice === "team2" ? match.team2 : "Tie");
              });
            }
          });

          dateSection.appendChild(card);
        });

        app.appendChild(dateSection);
      });
    }
