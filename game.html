<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>World Cup 2026 - My Predictions</title>

  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; font-size:10pt; }

    .topbar {
      display:flex; justify-content:space-between;
      padding:16px 20px; background:white;
      border-bottom:1px solid #ddd;
    }

    .page-wrap { max-width:980px; margin:auto; padding:18px; }

    .match-card {
      background:#fff; border:1px solid #ddd;
      border-radius:6px; padding:12px; margin-bottom:10px;
    }

    /* ✅ NEW: result coloring */
    .match-card.correct { background:#e8f5e9; }
    .match-card.incorrect { background:#ffebee; }

    .team { display:flex; align-items:center; gap:6px; }
    .teams-row { display:flex; justify-content:center; gap:12px; margin-bottom:10px; }

    .pick-btn.selected {
      background:#d8e9ff;
    }

    .status-line { margin-top:10px; text-align:center; }
    .status-line.locked { color:#b00000; }
  </style>
</head>

<body>

<div class="topbar">
  <div><b>World Cup Predictions</b></div>
  <button onclick="goBack()">Save My Predictions</button>
</div>

<div id="app" class="page-wrap"></div>

<!-- ✅ FIXED FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDpqwUsHn1qdUANh45tnW-e8aHVt8EF0Fk",
  authDomain: "wc-2026-843c7.firebaseapp.com",
  projectId: "wc-2026-843c7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Session
const userId = localStorage.getItem("userId");
if (!userId) window.location.href="index.html";

function goBack(){ window.location.href="landing.html"; }

// ✅ FIXED FLAGS
const teamFlagUrl = {
  "Mexico":"https://flagcdn.com/w40/mx.png",
  "South Africa":"https://flagcdn.com/w40/za.png",
  "USA":"https://flagcdn.com/w40/us.png"
};

// ✅ KEEP YOUR MATCHES ARRAY EXACTLY AS IS
const matches = [ /* your full dataset here */ ];

// ✅ ✅ NEW: STATIC MATCH RESULTS
const matchResults = {
  "A1": { score1:2, score2:1, outcome:"team1", status:"completed" },
  "A2": { score1:1, score2:1, outcome:"tie", status:"completed" }
};

// Firestore helpers
function predictionDocId(id){ return userId+"_"+id; }

function savePrediction(matchId,value){
  return db.collection("predictions").doc(predictionDocId(matchId)).set({
    user_id:userId,
    match_id:matchId,
    prediction:value
  });
}

async function loadUserPredictions(){
  const snap = await db.collection("predictions")
    .where("user_id","==",userId).get();

  const map={};
  snap.forEach(doc=>{
    const d=doc.data();
    map[d.match_id]=d.prediction;
  });

  return map;
}

// Lock rule
function isLocked(match){
  const kickoff=new Date(match.kickoffEdt).getTime();
  return Date.now() >= kickoff - 3600000;
}

// ✅ helper label
function label(choice,match){
  if(choice==="team1") return match.team1;
  if(choice==="team2") return match.team2;
  if(choice==="tie") return "Tie";
  return "No Pick";
}

// Render
async function render(){

  const app=document.getElementById("app");
  app.innerHTML="";

  const saved=await loadUserPredictions();

  matches.forEach(match=>{

    const result = matchResults[match.id] || null;
    const isCompleted = result && result.status==="completed";

    const pick = saved[match.id] || null;
    const locked = isLocked(match);

    const card=document.createElement("div");
    card.className="match-card";

    // ✅ NEW: color logic
    if(isCompleted && pick){
      if(pick===result.outcome){
        card.classList.add("correct");
      } else {
        card.classList.add("incorrect");
      }
    }

    const t1 = isCompleted
      ? `${match.team1} (${result.score1})`
      : match.team1;

    const t2 = isCompleted
      ? `${match.team2} (${result.score2})`
      : match.team2;

    card.innerHTML=`
      <div class="teams-row">
        <div class="team">${t1}</div>
        <b>vs</b>
        <div class="team">${t2}</div>
      </div>

      <div>
        <button class="${pick==="team1"?"selected":""}" ${locked?"disabled":""}
          onclick="pickFn('${match.id}','team1')">${match.team1}</button>

        <button class="${pick==="tie"?"selected":""}" ${locked?"disabled":""}
          onclick="pickFn('${match.id}','tie')">Tie</button>

        <button class="${pick==="team2"?"selected":""}" ${locked?"disabled":""}
          onclick="pickFn('${match.id}','team2')">${match.team2}</button>
      </div>
    `;

    const status=document.createElement("div");
    status.className="status-line";

    if(locked){
      status.classList.add("locked");
      status.textContent = "Locked: " + label(pick,match);
    } else if(pick){
      status.textContent = "Saved: " + label(pick,match);
    } else {
      status.textContent = "Pick before lock";
    }

    card.appendChild(status);
    app.appendChild(card);
  });
}

async function pickFn(matchId,val){
  await savePrediction(matchId,val);
  render();
}

render();

</script>

</body>
</html>
