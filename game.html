    // -----------------------------
    // Helpers
    // -----------------------------
    function formatPrettyDate(dateStr) {
      const dt = new Date(dateStr + "T00:00:00");
      return dt.toLocaleDateString("en-US", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
      });
    }

    function isLocked(match) {
      const kickoff = new Date(match.kickoffEdt).getTime();
      const lockTime = kickoff - (60 * 60 * 1000); // 1 hour before kickoff
      return Date.now() >= lockTime;
    }

    function groupMatchesByDate(data) {
      const map = {};
      data.forEach(m => {
        if (!map[m.date]) map[m.date] = [];
        map[m.date].push(m);
      });

      Object.keys(map).forEach(date => {
        map[date].sort((a, b) => {
          if (a.group !== b.group) return a.group.localeCompare(b.group);
          if (a.time !== b.time) return a.time.localeCompare(b.time);
          return a.id.localeCompare(b.id);
        });
      });

      return map;
    }

    // -----------------------------
    // Firestore integration
    // -----------------------------
    function predictionDocId(matchId) {
      return userId + "_" + matchId;
    }

    function savePrediction(matchId, predictionValue) {
      const docId = predictionDocId(matchId);

      return db.collection("predictions").doc(docId).set({
        user_id: userId,
        match_id: matchId,
        prediction: predictionValue,
        updated_at: new Date()
      });
    }

    function loadUserPredictions() {
      return db.collection("predictions")
        .where("user_id", "==", userId)
        .get()
        .then(snapshot => {
          const map = {};
          snapshot.forEach(doc => {
            const d = doc.data();
            if (d.match_id && d.prediction) {
              map[d.match_id] = d.prediction;
            }
          });
          return map;
        });
    }

      const byDate = groupMatchesByDate(matches);

        const dateSection = document.createElement("div");
        dateSection.className = "date-section";

        const dateHeading = document.createElement("div");
        dateHeading.className = "date-heading";
        dateHeading.textContent = formatPrettyDate(date);
        dateSection.appendChild(dateHeading);

        let currentGroup = null;

        byDate[date].forEach(match => {
          if (match.group !== currentGroup) {
            currentGroup = match.group;
            const groupHeading = document.createElement("div");
            groupHeading.className = "group-heading";
            groupHeading.textContent = "Group " + currentGroup;
            dateSection.appendChild(groupHeading);
          }

          const locked = isLocked(match);
          const existingPick = savedPredictions[match.id] || null;

          const card = document.createElement("div");
          card.className = "match-card";

          card.innerHTML = `
            <div class="match-top">
              <div><strong>Group ${match.group}</strong></div>
              <div class="match-time">${match.time} EDT</div>
            </div>

            <div class="teams-row">
              <div class="team">
                <img class="flag" src="${teamFlagUrl[match.team1]}" alt="${match.team1} flag">
                <span>${match.team1}</span>
              </div>

              <div class="vs">vs</div>

              <div class="team">
                <img class="flag" src="${teamFlagUrl[match.team2]}" alt="${match.team2} flag">
                <span>${match.team2}</span>
              </div>
            </div>

            <div class="actions">
              <button class="pick-btn ${existingPick === "team1" ? "selected" : ""}" ${locked ? "disabled" : ""} id="${match.id}_team1" data-match="${match.id}" data-choice="team1">${match.team1}</button>
              <button class="pick-btn ${existingPick === "tie" ? "selected" : ""}" ${locked ? "disabled" : ""} id="${match.id}_tie" data-match="${match.id}" data-choice="tie">Tie</button>
              <button class="pick-btn ${existingPick === "team2" ? "selected" : ""}" ${locked ? "disabled" : ""} id="${match.id}_team2" data-match="${match.id}" data-choice="team2">${match.team2}</button>
            </div>
          `;

          const status = document.createElement("div");
          status.className = "status-line";

          if (locked) {
            status.classList.add("locked");
            status.textContent = existingPick
              ? "Locked — your last saved pick is kept"
              : "Locked — prediction window closed";
          } else if (existingPick) {
            status.classList.add("saved");
            const label =
              existingPick === "team1" ? match.team1 :
              existingPick === "team2" ? match.team2 : "Tie";
            status.textContent = "Saved pick: " + label;
          } else {
            status.textContent = "You can change your selection until 1 hour before kickoff.";
          }

          card.appendChild(status);

          const buttons = card.querySelectorAll(".pick-btn");

          buttons.forEach(btn => {
            if (!locked) {
              btn.addEventListener("click", async function () {
                const choice = btn.getAttribute("data-choice");

                // Update UI
                buttons.forEach(b => b.classList.remove("selected"));
                btn.classList.add("selected");

                // Save to Firestore
                await savePrediction(match.id, choice);

                status.className = "status-line saved";
                status.textContent =
                  "Saved pick: " +
                  (choice === "team1" ? match.team1 :
                   choice === "team2" ? match.team2 : "Tie");
              });
            }
          });

          dateSection.appendChild(card);
        });

        app.appendChild(dateSection);
      });
    }

    render();
  </script>

</body>
</html>
