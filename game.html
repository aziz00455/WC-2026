<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>World Cup 2026 - My Prediction</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #222;
      font-size: 10pt;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .title {
      font-size: 14pt;
      font-weight: bold;
    }

    .top-buttons {
      display: flex;
      gap: 8px;
    }

    button {
      font-size: 10pt;
      padding: 6px 10px;
      cursor: pointer;
      border: 1px solid #bbb;
      background: #fff;
      border-radius: 4px;
    }

    button:hover:not(:disabled) {
      background: #f0f0f0;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .page-wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 14px 32px 14px;
    }

    .date-section {
      margin-bottom: 24px;
    }

    .date-heading {
      font-size: 14pt;
      font-weight: bold;
      margin: 8px 0 12px 0;
    }

    .group-heading {
      font-size: 10pt;
      font-weight: bold;
      margin: 10px 0 8px 0;
      color: #333;
    }

    .match-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .match-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .match-time {
      color: #444;
      white-space: nowrap;
    }

    .teams-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .team {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 170px;
      justify-content: center;
    }

    .flag {
      width: 22px;
      height: 16px;
      object-fit: cover;
      border: 1px solid #ccc;
      border-radius: 2px;
      background: #fff;
      flex-shrink: 0;
    }

    .vs {
      color: #666;
      font-weight: bold;
      min-width: 24px;
      text-align: center;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pick-btn.selected {
      background: #d8e9ff;
      border-color: #5c92d9;
      font-weight: bold;
    }

    .status-line {
      margin-top: 10px;
      text-align: center;
      color: #666;
    }

    .status-line.locked {
      color: #b00000;
    }

    .status-line.saved {
      color: #006400;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="title">My Prediction</div>

    <div class="top-buttons">
