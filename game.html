<!DOCTYPE html>
<html>
<head>
  <title>World Cup 2026 - Predictions</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      font-size: 10pt;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .title {
      font-size: 14pt;
      font-weight: bold;
    }

    .match {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }

    button {
      margin: 3px;
      padding: 6px;
      cursor: pointer;
    }

    .selected {
      background-color: #4CAF50;
      color: white;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="title">My Predictions</div>
  <div>
    <button onclick="goBack()">Back</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div id="matches"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDpqwUsHn1qdUANh45tnW-e8aHVt8EF0Fk",
  authDomain: "wc-2026-843c7.firebaseapp.com",
  projectId: "wc-2026-843c7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const userId = localStorage.getItem("userId");
if (!userId) window.location.href = "index.html";

function logout() {
  localStorage.removeItem("userId");
  window.location.href = "index.html";
}

function goBack() {
  window.location.href = "landing.html";
}

/* ✅ SAMPLE MATCHES — REPLACE WITH YOUR FULL 72 */
const matches = [
  { id: "A1", team1: "Team A", team2: "Team B" },
  { id: "A2", team1: "Team C", team2: "Team D" }
];

function renderMatches() {
  const container = document.getElementById("matches");
  container.innerHTML = "";

  matches.forEach(m => {
    const div = document.createElement("div");
    div.className = "match";

    div.innerHTML = `
      <div><b>${m.team1}</b> vs <b>${m.team2}</b></div>
      <button id="${m.id}_team1" onclick="pick('${m.id}','team1')">${m.team1}</button>
      <button id="${m.id}_tie" onclick="pick('${m.id}','tie')">Tie</button>
      <button id="${m.id}_team2" onclick="pick('${m.id}','team2')">${m.team2}</button>
    `;

    container.appendChild(div);
  });
}

function clearSelection(matchId) {
  ["team1","tie","team2"].forEach(opt => {
    document.getElementById(matchId + "_" + opt)?.classList.remove("selected");
  });
}

function highlightSelection(matchId, value) {
  clearSelection(matchId);
  document.getElementById(matchId + "_" + value)?.classList.add("selected");
}

/* ✅ SAVE TO FIRESTORE */
function savePrediction(matchId, value) {

  const docId = userId + "_" + matchId;

  db.collection("predictions").doc(docId).set({
    user_id: userId,
    match_id: matchId,
    prediction: value,
    updated_at: new Date()
  });

}

/* ✅ USER CLICK */
function pick(matchId, value) {
  highlightSelection(matchId, value);
  savePrediction(matchId, value);
}

/* ✅ LOAD USER SAVED PICKS */
function loadUserPredictions() {

  db.collection("predictions")
    .where("user_id", "==", userId)
    .get()
    .then(snapshot => {

      snapshot.forEach(doc => {
        const data = doc.data();
        highlightSelection(data.match_id, data.prediction);
      });

    });
}

/* ✅ INIT */
renderMatches();
loadUserPredictions();

</script>

</body>
</html>
