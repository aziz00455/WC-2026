<!DOCTYPE html>
<html>
<head>
  <title>Game</title>

  <style>

    body {
      font-family: Arial;
      margin: 0;
      font-size: 10pt;   /* ✅ all content */
    }

    /* ✅ HEADER */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
    }

    /* ✅ TITLE */
    .title {
      font-size: 14pt;
      font-weight: bold;
    }

    /* ✅ BUTTON GROUP */
    .buttons {
      display: flex;
      gap: 10px;
    }

    button {
      font-size: 10pt;
      padding: 6px 12px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- ✅ HEADER -->
<div class="topbar">

  <!-- ✅ TITLE -->
  <div class="title">My Prediction</div>

  <!-- ✅ BUTTONS -->
  <div class="buttons">
    <button onclick="goBack()">Back to Leaderboard</button>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<script>

  // ✅ LOGIN PROTECTION
  const userId = localStorage.getItem("userId");

  if (!userId) {
    window.location.href = "index.html";
  }

  // ✅ NAVIGATION
  function goBack() {
    window.location.href = "landing.html";
  }

  // ✅ LOGOUT
  function logout() {
    localStorage.removeItem("userId");
    window.location.href = "index.html";
  }

</script>

</body>
</html>
