<!DOCTYPE html>
<html>
<head>
  <title>World Cup 2026 Leaderboard</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
      font-size: 10pt;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 16px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    .title {
      font-size: 14pt;
      font-weight: bold;
    }

    .top-buttons button {
      margin-left: 5px;
    }

    .container {
      text-align: center;
      margin-top: 20px;
    }

    table {
      margin: 0 auto;
      border-collapse: collapse;
      width: 600px;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }

    th {
      background: #333;
      color: white;
    }

  </style>
</head>

<body>

<div class="topbar">
  <div class="title">World Cup 2026</div>
  <div class="top-buttons">
    <button onclick="goToGame()">Play</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <h3>Current Leaderboard</h3>
  <div id="gamesPlayed">Loading...</div>

  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th># Picks</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody id="leaderboard"></tbody>
  </table>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDpqwUsHn1qdUANh45tnW-e8aHVt8EF0Fk",
  authDomain: "wc-2026-843c7.firebaseapp.com",
  projectId: "wc-2026-843c7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const userId = localStorage.getItem("userId");
if (!userId) window.location.href = "index.html";

function logout() {
  localStorage.removeItem("userId");
  window.location.href = "index.html";
}

function goToGame() {
  window.location.href = "game.html";
}

/* ✅ Count completed matches */
function countCompleted(snapshot) {
  let count = 0;

  snapshot.forEach(doc => {
    const data = doc.data();

    const done =
      data.status === "completed" ||
      data.final === true ||
      data.isCompleted === true ||
      Object.keys(data).length === 0;

    if (done) count++;
  });

  return count;
}

/* ✅ Count picks */
function buildPickMap(snapshot) {
  const map = {};

  snapshot.forEach(doc => {
    const d = doc.data();
    if (!d.user_id || !d.match_id || !d.prediction) return;

    if (!map[d.user_id]) map[d.user_id] = new Set();
    map[d.user_id].add(d.match_id);
  });

  return map;
}

async function loadLeaderboard() {

  const [usersSnap, predSnap, matchSnap] = await Promise.all([
    db.collection("users").get(),
    db.collection("predictions").get(),
    db.collection("matchResults").get()
  ]);

  const completed = countCompleted(matchSnap);
  document.getElementById("gamesPlayed").innerText =
    "Total games played: " + completed + " of 72";

  const pickMap = buildPickMap(predSnap);

  let users = [];

  usersSnap.forEach(doc => {
    const d = doc.data();

    users.push({
      username: d.username,
      score: d.total_score || 0,
      picks: pickMap[doc.id] ? pickMap[doc.id].size : 0
    });
  });

  users.sort((a,b) => {
    if (b.score !== a.score) return b.score - a.score;
    return a.username.localeCompare(b.username);
  });

  const table = document.getElementById("leaderboard");
  table.innerHTML = "";

  users.forEach((u,i) => {
    table.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${u.username}</td>
        <td>${u.picks}</td>
        <td>${u.score}</td>
      </tr>
    `;
  });
}

loadLeaderboard();

</script>

</body>
</html>
