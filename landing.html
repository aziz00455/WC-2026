<!DOCTYPE html>
<html>
<head>
  <title>Landing</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2>Landing Page</h2>

<button onclick="logout()">Logout</button>

<script>

  // ✅ PROTECT PAGE (NEW)
  const userId = localStorage.getItem("userId");

  if (!userId) {
    window.location.href = "index.html";
  }

  // ✅ LOGOUT
  function logout() {
    localStorage.removeItem("userId");
    window.location.href = "index.html";
  }

</script>

</body>
</html>
``
