<!DOCTYPE html>
<html>
<head>
  <title>Landing</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
      font-size: 16px;

<body>

<h2>Landing Page</h2>

<button onclick="logout()">Logout</button>

<script>

  function logout() {
    localStorage.removeItem("userId");  // clear session
    window.location.href = "index.html"; // go back to login
  }

</script>

</body>
</html>
