<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>World Cup 2026 - Leaderboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      font-size: 10pt;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
    }

    .title {
      font-size: 14pt;
      font-weight: bold;
    }

    .top-buttons {
      display: flex;
      gap: 8px;
    }

    button {
      font-size: 10pt;
      padding: 6px 10px;
      border: 1px solid #bbb;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
    }

    .page-wrap {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid #ddd;
      table-layout: fixed;   /* ✅ KEY: uniform columns */
    }

    th, td {
      padding: 6px 6px;     /* ✅ tighter spacing */
      border-bottom: 1px solid #eee;
      font-size: 10pt;
    }

    th {
      background: #fafafa;
      text-align: center;
    }

    td {
      text-align: center;
    }

    /* ✅ Specific column widths */
    th:nth-child(1), td:nth-child(1) { width: 50px; }   /* Rank */
    th:nth-child(2), td:nth-child(2) { 
      width: 180px; 
      text-align: left; 
      padding-left: 10px;
    } /* Name */

    th:nth-child(n+3), td:nth-child(n+3) {
      width: 80px;   /* ✅ uniform numeric columns */
    }

    .score-col {
      background: #fff7cc;
      font-weight: bold;
    }

    tr.my-row {
      background: #d8e9ff;
      font-weight: bold;
    }

    .matches-completed {
      margin-bottom: 10px;
      text-align: right;
      font-weight: bold;
    }

    a {
      color: #1a73e8;
      text-decoration: none;
      white-space: nowrap;
    }

    a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

<div class="topbar">
  <div class="title">World Cup 2026 - Leaderboard</div>

  <div class="top-buttons">
    <button onclick="goToGame()">Predict</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="page-wrap">

  <div id="matchesCompleted" class="matches-completed"></div>

  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th class="score-col">Score</th>
        <th>Picks</th>
        <th>Pending</th>
        <th>Correct</th>
        <th>Incorrect</th>
        <th>Not Picked</th>
      </tr>
    </thead>
    <tbody id="leaderboardBody"></tbody>
  </table>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDpqwUsHn1qdUANh45tnW-e8aHVt8EF0Fk",
  authDomain: "wc-2026-843c7.firebaseapp.com",
  projectId: "wc-2026-843c7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const userId = localStorage.getItem("userId");

function goToGame() {
  window.location.href = "game.html";
}

function logout() {
  localStorage.removeItem("userId");
  window.location.href = "index.html";
}

function buildResultsMap(snapshot) {
  const map = {};
  let completed = 0;

  snapshot.forEach(doc => {
    const d = doc.data();
    map[doc.id] = d;
    if (d.status === "completed") completed++;
  });

  return { map, completed };
}

function buildUserStats(predSnap, resultsMap) {

  const stats = {};

  predSnap.forEach(doc => {
    const d = doc.data();

    if (!stats[d.user_id]) {
      stats[d.user_id] = {
        picks: 0,
        correct: 0,
        incorrect: 0,
        pending: 0,
        completedPicks: 0,
        score: 0
      };
    }

    stats[d.user_id].picks++;

    const result = resultsMap[d.match_id];

    if (!result || result.status !== "completed") {
      stats[d.user_id].pending++;
      return;
    }

    stats[d.user_id].completedPicks++;

    if (d.prediction === result.outcome) {
      stats[d.user_id].correct++;
      stats[d.user_id].score += 1;
    } else {
      stats[d.user_id].incorrect++;
    }
  });

  return stats;
}

function renderLeaderboard(rows) {

  const tbody = document.getElementById("leaderboardBody");
  tbody.innerHTML = "";

  let rank = 0;
  let lastScore = null;

  rows.forEach((row, i) => {

    if (row.score !== lastScore) {
      rank = i + 1;
      lastScore = row.score;
    }

    const tr = document.createElement("tr");

    if (row.user_id === userId) {
      tr.classList.add("my-row");
    }

    const nameLink =
      row.user_id === userId
        ? `<a href="game.html">${row.username}</a>`
        : `<a href="showpick.html?uid=${row.user_id}&name=${encodeURIComponent(row.username)}">${row.username}</a>`;

    tr.innerHTML = `
      <td>${rank}</td>
      <td>${nameLink}</td>
      <td class="score-col">${row.score}</td>
      <td>${row.picks}</td>
      <td>${row.pending}</td>
      <td>${row.correct}</td>
      <td>${row.incorrect}</td>
      <td>${row.notPicked}</td>
    `;

    tbody.appendChild(tr);
  });
}

async function loadLeaderboard() {

  const [usersSnap, predSnap, resultsSnap] = await Promise.all([
    db.collection("users").get(),
    db.collection("predictions").get(),
    db.collection("matchResults").get()
  ]);

  const { map: resultsMap, completed } = buildResultsMap(resultsSnap);
  const statsMap = buildUserStats(predSnap, resultsMap);

  document.getElementById("matchesCompleted").textContent =
    `Matches Completed: ${completed} / 72`;

  const rows = [];

  usersSnap.forEach(doc => {

    const d = doc.data();

    const stats = statsMap[doc.id] || {
      picks: 0, correct: 0, incorrect: 0,
      pending: 0, completedPicks: 0, score: 0
    };

    const notPicked = completed - stats.completedPicks;
    const finalScore = (stats.score || 0) + (notPicked * -0.25);

    rows.push({
      user_id: doc.id,
      username: d.username || "(no name)",
      score: Number(finalScore.toFixed(2)),
      picks: stats.picks,
      pending: stats.pending,
      correct: stats.correct,
      incorrect: stats.incorrect,
      notPicked: notPicked
    });

  });

  rows.sort((a, b) => b.score - a.score);

  renderLeaderboard(rows);
}

loadLeaderboard();
setInterval(loadLeaderboard, 5000);

</script>

</body>
</html>
``
