<!DOCTYPE html>
<html>
<head>
  <title>WC-2026 Login</title>

  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f4f4;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 260px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      cursor: pointer;
    }

    #message {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>WC-2026</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="createUser()">Create User</button>

  <div id="message"></div>
</div>


<!-- ✅ FIREBASE (NON-MODULE VERSION) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

  // ✅ REPLACE WITH YOUR REAL CONFIG
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDpqwUsHn1qdUANh45tnW-e8aHVt8EF0Fk",
  authDomain: "wc-2026-843c7.firebaseapp.com",
  projectId: "wc-2026-843c7",
  storageBucket: "wc-2026-843c7.firebasestorage.app",
  messagingSenderId: "767583870499",
  appId: "1:767583870499:web:b8ce30fe3f3481dd5a1b96",
  measurementId: "G-VW40EYDFB8"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);


// ✅ LOGIN
function login() {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("message");

  if (!username || !password) {
    msg.style.color = "red";
    msg.innerText = "Enter username and password";
    return;
  }

  db.collection("users")
    .where("username", "==", username)
    .where("password", "==", password)
    .get()
    .then(snapshot => {

      if (!snapshot.empty) {

        const userId = snapshot.docs[0].id;
        localStorage.setItem("userId", userId);

        msg.style.color = "green";
        msg.innerText = "Login success";

        window.location.href = "landing.html";

      } else {
        msg.style.color = "red";
        msg.innerText = "Invalid username or password";
      }

    });
}


// ✅ CREATE USER
function createUser() {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("message");

  if (!username || !password) {
    msg.style.color = "red";
    msg.innerText = "Enter username and password";
    return;
  }

  db.collection("users")
    .where("username", "==", username)
    .get()
    .then(snapshot => {

      if (!snapshot.empty) {
        msg.style.color = "red";
        msg.innerText = "Username already exists";
        return;
      }

      db.collection("users").add({
        username: username,
        password: password,
        total_score: 0
      });

      msg.style.color = "green";
      msg.innerText = "User created. Now login.";

    });
}

</script>

</body>
</html>
