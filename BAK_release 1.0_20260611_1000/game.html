    .topbar {

      position: sticky;

      font-size: 10pt;
      padding: 6px 10px;
      cursor: pointer;

      background: #fff;
      border-radius: 4px;
    }

    button:hover:not(:disabled) {
      background: #f0f0f0;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .page-wrap {

    }

      font-weight: bold;

    }

    .group-heading {
      font-size: 10pt;
      font-weight: bold;
      margin: 10px 0 8px 0;
      color: #333;
    }

    .match-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
    }
	
	.match-card.correct {
      background: #e6f4ea;  /* light green */
    }

    .match-card.wrong {
      background: #fdecea;  /* light red */
    }

    .match-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .match-time {
      color: #444;
      white-space: nowrap;
    }

    .teams-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .team {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 170px;
      justify-content: center;
    }

    .flag {
      width: 22px;
      height: 16px;
      object-fit: cover;
      border: 1px solid #ccc;
      border-radius: 2px;
      background: #fff;
      flex-shrink: 0;
    }

    .vs {
      color: #666;
      font-weight: bold;
      min-width: 24px;
      text-align: center;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pick-btn.selected {
      background: #d8e9ff;
      border-color: #5c92d9;
      font-weight: bold;
    }

    .status-line {
      margin-top: 10px;
      text-align: center;
      color: #666;
    }

    .status-line.locked {
      color: #b00000;
    }

    .status-line.saved {
      color: #006400;
    }
  </style>

    // -----------------------------
    // Helpers
    // -----------------------------
    function formatPrettyDate(dateStr) {
      const dt = new Date(dateStr + "T00:00:00");
      return dt.toLocaleDateString("en-US", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
      });
    }

    function isLocked(match) {
      const kickoff = new Date(match.kickoffEdt).getTime();
      const lockTime = kickoff - (60 * 60 * 1000); // 1 hour before kickoff
      return Date.now() >= lockTime;
    }

    function groupMatchesByDate(data) {
      const map = {};
      data.forEach(m => {
        if (!map[m.date]) map[m.date] = [];
        map[m.date].push(m);
      });

      Object.keys(map).forEach(date => {
        map[date].sort((a, b) => {
          if (a.group !== b.group) return a.group.localeCompare(b.group);
          if (a.time !== b.time) return a.time.localeCompare(b.time);
          return a.id.localeCompare(b.id);
        });
      });

      return map;
    }

    // -----------------------------
    // Firestore integration
    // -----------------------------
    function predictionDocId(matchId) {
      return userId + "_" + matchId;
    }

    function savePrediction(matchId, predictionValue) {
      const docId = predictionDocId(matchId);

      return db.collection("predictions").doc(docId).set({
        user_id: userId,
        match_id: matchId,
        prediction: predictionValue,
        updated_at: new Date()
      });
    }

    function loadUserPredictions() {
      return db.collection("predictions")
        .where("user_id", "==", userId)
        .get()
        .then(snapshot => {
          const map = {};
          snapshot.forEach(doc => {
            const d = doc.data();
            if (d.match_id && d.prediction) {
              map[d.match_id] = d.prediction;
            }
          });
          return map;
        });
    }

// -----------------------------
// Render
// -----------------------------
async function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const savedPredictions = await loadUserPredictions();
  const byDate = groupMatchesByDate(matches);
  const dates = Object.keys(byDate).sort();

  // ✅ ADD THIS (load results)
  const matchResultsSnap = await db.collection("matchResults").get();
  const matchResults = {};
  matchResultsSnap.forEach(doc => matchResults[doc.id] = doc.data());

  dates.forEach(date => {
    const dateSection = document.createElement("div");
    dateSection.className = "date-section";

    const dateHeading = document.createElement("div");
    dateHeading.className = "date-heading";
    dateHeading.textContent = formatPrettyDate(date);
    dateSection.appendChild(dateHeading);

    let currentGroup = null;

    byDate[date].forEach(match => {
      if (match.group !== currentGroup) {
        currentGroup = match.group;
        const groupHeading = document.createElement("div");
        groupHeading.className = "group-heading";
        groupHeading.textContent = "Group " + currentGroup;
        dateSection.appendChild(groupHeading);
      }

      const locked = isLocked(match);
      const existingPick = savedPredictions[match.id] || null;

      // ✅ ✅ ONLY CHANGE (time logic)
      const resultDoc = matchResults[match.id];

      let displayTime = "Kickoff: " + match.time;

      if (resultDoc && resultDoc.status === "completed" && resultDoc.completed_at) {
        const dt = new Date(resultDoc.completed_at);
        displayTime = "Final " + dt.toLocaleString("en-US", {
          hour: "2-digit",
          minute: "2-digit",
		  hour12: false
        });
      }

	const card = document.createElement("div");
	card.className = "match-card";

	// ✅ NEW LOGIC
	if (resultDoc && resultDoc.status === "completed") {

	  if (!existingPick) {
	  	  // ✅ NO PICK → treat as wrong
		  card.classList.add("wrong");

	  } else if (resultDoc.outcome === existingPick) {
		// ✅ correct
		card.classList.add("correct");

	  } else {
		// ❌ incorrect
		card.classList.add("wrong");
	  }

	}


      card.innerHTML = `
        <div class="match-top">
          <div><strong>Group ${match.group}</strong></div>
          <div class="match-time">${displayTime} EDT</div>
        </div>

        <div class="teams-row">
          <div class="team">
            <img class="flag" src="${teamFlagUrl[match.team1]}" alt="${match.team1} flag">
            <span>${match.team1}</span>
          </div>


	<div class="vs">
	  ${
		resultDoc && resultDoc.status === "completed"
		  ? resultDoc.score1 + " - " + resultDoc.score2
		  : "vs"
	  }
	</div>


          <div class="team">
            <img class="flag" src="${teamFlagUrl[match.team2]}" alt="${match.team2} flag">
            <span>${match.team2}</span>
          </div>
        </div>

        <div class="actions">
          <button class="pick-btn ${existingPick === "team1" ? "selected" : ""}" ${locked ? "disabled" : ""} id="${match.id}_team1" data-match="${match.id}" data-choice="team1">${match.team1}</button>
          <button class="pick-btn ${existingPick === "tie" ? "selected" : ""}" ${locked ? "disabled" : ""} id="${match.id}_tie" data-match="${match.id}" data-choice="tie">Tie</button>
          <button class="pick-btn ${existingPick === "team2" ? "selected" : ""}" ${locked ? "disabled" : ""} id="${match.id}_team2" data-match="${match.id}" data-choice="team2">${match.team2}</button>
        </div>
      `;

      const status = document.createElement("div");
      status.className = "status-line";

      if (locked) {
        status.classList.add("locked");
        const label =
          existingPick === "team1" ? match.team1 :
          existingPick === "team2" ? match.team2 : "Tie";
        status.textContent = existingPick
          ? "Locked — You picked: " + label
          : "Locked — You did not pick";
      } else if (existingPick) {
        status.classList.add("saved");
        const label =
          existingPick === "team1" ? match.team1 :
          existingPick === "team2" ? match.team2 : "Tie";
        status.textContent = "You picked: " + label;
      } else {
        status.textContent = "You can change your selection until 1 hour before kickoff.";
      }

      card.appendChild(status);

      const buttons = card.querySelectorAll(".pick-btn");

      buttons.forEach(btn => {
        if (!locked) {
          btn.addEventListener("click", async function () {
            const choice = btn.getAttribute("data-choice");

            buttons.forEach(b => b.classList.remove("selected"));
            btn.classList.add("selected");

            await savePrediction(match.id, choice);

            status.className = "status-line saved";
            status.textContent =
              "Saved pick: " +
              (choice === "team1" ? match.team1 :
               choice === "team2" ? match.team2 : "Tie");
          });
        }
      });

      dateSection.appendChild(card);
    });

    app.appendChild(dateSection);
  });
}

    render();
